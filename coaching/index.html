><textarea id="detail" name="detail" required placeholder="请说明目标、已有材料、预算时间或希望解决的问题"></textarea></div><button class="button primary" type="submit">提交陪跑咨询</button></form><div class="form-success" role="status"></div></div></div></section></main><footer class="site-footer"><div class="footer-inner"><span>Codex 服务站 · 第一版静态原型</span><span>表单已接入飞书需求表，提交后进入后台跟进。</span></div></footer><script src="../config.js"></script><script src="../app.js"></script></body></html>
